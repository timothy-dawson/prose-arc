services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 with ltree extension
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: prosearc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: prosearc
      POSTGRES_PASSWORD: prosearc
      POSTGRES_DB: prosearc
    ports:
      - "5533:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prosearc -d prosearc"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: prosearc-redis
    restart: unless-stopped
    ports:
      - "6480:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # fake-gcs-server — GCS-compatible object storage emulator for local dev
  # -public-host sets the hostname embedded in object download URLs so the
  # browser can reach them at http://localhost:4000/...
  # ---------------------------------------------------------------------------
  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    container_name: prosearc-fake-gcs
    restart: unless-stopped
    command: ["-scheme", "http", "-port", "4443", "-public-host", "localhost:4000", "-data", "/data"]
    ports:
      - "4000:4443"   # GCS JSON API (browser-accessible)
    volumes:
      - gcs-data:/data

  # Init container: creates the prosearc bucket after fake-gcs-server starts
  fake-gcs-init:
    image: curlimages/curl:latest
    container_name: prosearc-fake-gcs-init
    depends_on:
      - fake-gcs
    environment:
      GCS_ENDPOINT: http://fake-gcs:4443
      GCS_BUCKET: prosearc
    volumes:
      - ./src/backend/scripts/init-fake-gcs.sh:/init-fake-gcs.sh:ro
    entrypoint: ["/bin/sh", "/init-fake-gcs.sh"]
    restart: "no"

  # ---------------------------------------------------------------------------
  # Backend — FastAPI + uvicorn (hot-reload via volume mount)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      target: development
    container_name: prosearc-backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      # Inter-container URLs use service names + internal ports (unchanged)
      DATABASE_URL: postgresql+asyncpg://prosearc:prosearc@postgres:5432/prosearc
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      # Storage — GCS emulator (fake-gcs-server)
      STORAGE_BACKEND: gcs
      GCS_BUCKET: prosearc
      STORAGE_EMULATOR_HOST: http://fake-gcs:4443
      GCS_PUBLIC_HOST: http://localhost:4000
      APP_ENV: development
      APP_URL: http://localhost:3100
      API_URL: http://localhost:8100
      CORS_ORIGINS: http://localhost:3100
    ports:
      - "8100:8000"
    volumes:
      - ./src/backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      fake-gcs-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Celery Worker — all 3 queues in dev (default, ai, export)
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      target: development
    container_name: prosearc-worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker -Q default,ai,export --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://prosearc:prosearc@postgres:5432/prosearc
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      # Storage — GCS emulator (fake-gcs-server)
      STORAGE_BACKEND: gcs
      GCS_BUCKET: prosearc
      STORAGE_EMULATOR_HOST: http://fake-gcs:4443
      GCS_PUBLIC_HOST: http://localhost:4000
      APP_ENV: development
    volumes:
      - ./src/backend:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      fake-gcs-init:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------
  # Frontend — Vite dev server (HMR)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      target: development
    container_name: prosearc-frontend
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0 --port 3000
    environment:
      VITE_API_URL: http://localhost:8100
    ports:
      - "3100:3000"
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres-data:
  gcs-data:
