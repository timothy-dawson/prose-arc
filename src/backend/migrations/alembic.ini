# Alembic configuration
# The actual database URL is read from the application settings in env.py,
# so the sqlalchemy.url value here is a placeholder only.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# Placeholder — overridden in env.py via settings.database_url
sqlalchemy.url = postgresql+asyncpg://prosearc:prosearc@localhost:5432/prosearc

[post_write_hooks]
# Run ruff on generated migration files
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
