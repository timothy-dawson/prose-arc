name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: prosearc
          POSTGRES_PASSWORD: prosearc
          POSTGRES_DB: prosearc_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install backend dependencies
        working-directory: src/backend
        run: uv sync --all-extras

      - name: Lint & type-check
        working-directory: src/backend
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy app

      - name: Run backend tests
        working-directory: src/backend
        env:
          DATABASE_URL: postgresql+asyncpg://prosearc:prosearc@localhost:5432/prosearc_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret
          APP_ENV: test
        run: uv run pytest -x --tb=short

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Lint & type-check frontend
        working-directory: src/frontend
        run: |
          npm run lint
          npm run typecheck

      - name: Run frontend tests
        working-directory: src/frontend
        run: npm test -- --run

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push backend image
        env:
          IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/prose-arc/backend:${{ github.sha }}
        run: |
          docker build -t $IMAGE src/backend
          docker push $IMAGE

      - name: Deploy to Cloud Run
        env:
          IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/prose-arc/backend:${{ github.sha }}
        run: |
          gcloud run deploy ${{ secrets.CLOUD_RUN_SERVICE_STAGING }} \
            --image $IMAGE \
            --region ${{ secrets.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --platform managed \
            --quiet

      - name: Run database migrations
        run: |
          gcloud run jobs execute prose-arc-migrate-staging \
            --region ${{ secrets.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --wait

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Build frontend
        working-directory: src/frontend
        env:
          VITE_API_URL: ${{ secrets.STAGING_API_URL }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_INVITE_REQUIRED: ${{ secrets.VITE_INVITE_REQUIRED }}
        run: npm run build

      - name: Upload to GCS
        run: |
          gsutil -m rsync -r -d src/frontend/dist/ gs://${{ secrets.GCS_STAGING_BUCKET }}/
          gsutil -m setmeta -h "Cache-Control:no-cache,no-store" gs://${{ secrets.GCS_STAGING_BUCKET }}/index.html
