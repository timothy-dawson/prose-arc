name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Git SHA or ref to deploy (defaults to HEAD)'
        required: false
        default: ''

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push backend image
        env:
          IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/prose-arc/backend:${{ github.sha }}
        run: |
          docker build -t $IMAGE src/backend
          docker push $IMAGE

      - name: Deploy to Cloud Run
        env:
          IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/prose-arc/backend:${{ github.sha }}
        run: |
          gcloud run deploy ${{ secrets.CLOUD_RUN_SERVICE_PROD }} \
            --image $IMAGE \
            --region ${{ secrets.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --platform managed \
            --quiet

      - name: Run database migrations
        run: |
          gcloud run jobs execute prose-arc-migrate-prod \
            --region ${{ secrets.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --wait

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-backend
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Build frontend
        working-directory: src/frontend
        env:
          VITE_API_URL: ${{ secrets.PROD_API_URL }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_INVITE_REQUIRED: ${{ secrets.VITE_INVITE_REQUIRED }}
        run: npm run build

      - name: Upload to GCS
        run: |
          gsutil -m rsync -r -d src/frontend/dist/ gs://${{ secrets.GCS_PROD_BUCKET }}/
          gsutil -m setmeta -h "Cache-Control:no-cache,no-store" gs://${{ secrets.GCS_PROD_BUCKET }}/index.html
